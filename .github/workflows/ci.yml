name: CI

on:
  push:
    branches: [feature/ielts-mvp, main]
  pull_request:
    branches: [main]

env:
  DJANGO_SECRET_KEY: ci-temp-secret-key-do-not-use-in-prod
  DJANGO_DB_HOST: localhost
  DJANGO_DB_PORT: '5432'
  DJANGO_DB_NAME: engdb
  DJANGO_DB_USER: postgres
  DJANGO_DB_PASSWORD: postgres

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: engdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run migrations
        run: |
          python manage.py makemigrations
          python manage.py migrate

      - name: Run tests
        run: python -m pytest -x --tb=short || python manage.py test --verbosity=2

  frontend:
    name: Frontend Build & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx vite build

      - name: Run tests
        run: npm run test
